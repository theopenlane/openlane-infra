apiVersion: apps/v1
kind: Deployment
metadata:
  name: trustcenter-fe
  namespace: gateway-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trustcenter-fe
  template:
    metadata:
      labels:
        app: trustcenter-fe
    spec:
      nodeSelector:
        cloud.google.com/compute-class: Scale-Out
        kubernetes.io/arch: arm64
      containers:
        - name: trustcenter-fe
          image: ghcr.io/theopenlane/trust-center-fe:0.0.14
          ports:
            - containerPort: 3002
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: trustcenter-fe
  namespace: gateway-system
spec:
  selector:
    app: trustcenter-fe
  ports:
    - port: 3002
      targetPort: 3002
      protocol: TCP
  type: ClusterIP
